server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # API proxies — route to backend services by Docker service name
    location /api/school/dashboard {
        proxy_pass http://dashboard-service:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/school/experiences {
        proxy_pass http://experience-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/school/courses {
        proxy_pass http://experience-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/school/cohorts {
        proxy_pass http://enrolment-service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/school/enrolments {
        proxy_pass http://enrolment-service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

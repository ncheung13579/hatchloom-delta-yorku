services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hatchloom
      POSTGRES_USER: hatchloom
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatchloom -d hatchloom"]
      interval: 2s
      timeout: 5s
      retries: 10

  enrolment-service:
    build: ./enrolment-service
    ports:
      - "8003:8003"
    environment:
      APP_NAME: EnrolmentService
      APP_KEY: base64:dGVzdGtleWZvcmVucm9sbWVudHNlcnZpY2Ux
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: hatchloom
      DB_USERNAME: hatchloom
      DB_PASSWORD: secret
      CACHE_STORE: array
      SESSION_DRIVER: array
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('localhost', 8003) ? 0 : 1);"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s

  experience-service:
    build: ./experience-service
    ports:
      - "8002:8002"
    environment:
      APP_NAME: ExperienceService
      APP_KEY: base64:dGVzdGtleWZvcmV4cGVyaWVuY2VzZXJ2aWNl
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: hatchloom
      DB_USERNAME: hatchloom
      DB_PASSWORD: secret
      ENROLMENT_SERVICE_URL: http://enrolment-service:8003
      CACHE_STORE: array
      SESSION_DRIVER: array
    depends_on:
      enrolment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('localhost', 8002) ? 0 : 1);"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s

  dashboard-service:
    build: ./dashboard-service
    ports:
      - "8001:8001"
    environment:
      APP_NAME: DashboardService
      APP_KEY: base64:dGVzdGtleWZvcmRhc2hib2FyZHNlcnZpY2Ux
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: hatchloom
      DB_USERNAME: hatchloom
      DB_PASSWORD: secret
      EXPERIENCE_SERVICE_URL: http://experience-service:8002
      ENROLMENT_SERVICE_URL: http://enrolment-service:8003
      CACHE_STORE: array
      SESSION_DRIVER: array
    depends_on:
      experience-service:
        condition: service_healthy
      enrolment-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      dashboard-service:
        condition: service_started

volumes:
  pgdata:
